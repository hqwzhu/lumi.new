name: LumiOS CI and Windows Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create a GitHub Release from the Windows installer
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      prerelease:
        description: Mark the GitHub Release as prerelease
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build frontend dist
        run: npm run build:desktop-ui
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p desktop-resources/dist-server
          mkdir -p desktop-resources/gpt-sovits-src
          mkdir -p desktop-resources/data/voice_training
          touch desktop-resources/dist-server/.gitkeep
          touch desktop-resources/gpt-sovits-src/.gitkeep
          touch desktop-resources/data/voice_training/.gitkeep
          touch desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux check dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev libxtst-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: src-tauri

  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop-ui

  build-windows:
    name: Build Windows installer
    needs: [typecheck, rust-check, test, frontend-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download bundled Node.js runtime
        run: node scripts/download-node-binary.mjs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri Windows app
        run: npm run tauri:build
      - name: Export Windows release kit
        run: |
          npm run export:windows-installer
          npm run package:windows-release
          npm run release:windows:check
          npm run package:windows-release:check
          npm run site:downloads
      - name: Upload Windows release kit
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-windows-release-kit
          path: |
            release/windows/**
            public/downloads/windows.html
            public/downloads/windows.json
          if-no-files-found: error

  release:
    name: Create Windows GitHub Release
    needs: build-windows
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lumi-os-windows-release-kit
          path: artifacts
      - name: Read release version
        id: meta
        run: |
          VERSION="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/windows/manifest.json','utf8')); process.stdout.write(m.version)")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=windows-v${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lumi OS ${{ steps.meta.outputs.version }} Windows
          body_path: artifacts/release/windows/RELEASE_NOTES.md
          files: |
            artifacts/release/windows/LumiOS-Windows-${{ steps.meta.outputs.version }}.zip
            artifacts/release/windows/Lumi OS_${{ steps.meta.outputs.version }}_x64-setup.exe
            artifacts/release/windows/SHA256SUMS.txt
            artifacts/release/windows/manifest.json
            artifacts/release/windows/RELEASE_NOTES.md
            artifacts/public/downloads/windows.html
            artifacts/public/downloads/windows.json
          draft: false
          prerelease: ${{ inputs.prerelease == 'true' }}
