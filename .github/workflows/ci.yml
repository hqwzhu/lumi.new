name: LumiOS CI and Desktop Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create a GitHub Release from the selected desktop installer
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_platform:
        description: Desktop platform to publish when publish_release is true
        required: true
        default: "windows"
        type: choice
        options:
          - "windows"
          - "macos"
      prerelease:
        description: Mark the GitHub Release as prerelease
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build frontend dist
        run: npm run build:desktop-ui
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p desktop-resources/dist-server
          mkdir -p desktop-resources/gpt-sovits-src
          mkdir -p desktop-resources/data/voice_training
          touch desktop-resources/dist-server/.gitkeep
          touch desktop-resources/gpt-sovits-src/.gitkeep
          touch desktop-resources/data/voice_training/.gitkeep
          touch desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux check dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev libxtst-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: src-tauri

  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop-ui

  build-windows:
    name: Build Windows installer
    needs: [typecheck, rust-check, test, frontend-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download bundled Node.js runtime
        run: node scripts/download-node-binary.mjs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri Windows app
        run: npm run tauri:build
      - name: Export Windows release kit
        run: |
          npm run export:windows-installer
          npm run package:windows-release
          npm run release:windows:check
          npm run package:windows-release:check
          npm run site:downloads
      - name: Upload Windows release kit
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-windows-release-kit
          path: |
            release/windows/**
            public/downloads/windows.html
            public/downloads/windows.json
          if-no-files-found: error

  release:
    name: Create Windows GitHub Release
    needs: build-windows
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true' && inputs.release_platform == 'windows'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lumi-os-windows-release-kit
          path: artifacts
      - name: Read release version
        id: meta
        run: |
          VERSION="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/windows/manifest.json','utf8')); process.stdout.write(m.version)")"
          INSTALLER="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/windows/manifest.json','utf8')); process.stdout.write(m.installerName)")"
          UNINSTALLER="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/windows/manifest.json','utf8')); process.stdout.write(m.uninstallerName)")"
          PACKAGE="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/windows/manifest.json','utf8')); process.stdout.write(m.packageName)")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "installer=${INSTALLER}" >> "$GITHUB_OUTPUT"
          echo "uninstaller=${UNINSTALLER}" >> "$GITHUB_OUTPUT"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=windows-v${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lumi OS ${{ steps.meta.outputs.version }} Windows
          body_path: artifacts/release/windows/RELEASE_NOTES.md
          files: |
            artifacts/release/windows/${{ steps.meta.outputs.package }}
            artifacts/release/windows/${{ steps.meta.outputs.installer }}
            artifacts/release/windows/${{ steps.meta.outputs.uninstaller }}
            artifacts/release/windows/SHA256SUMS.txt
            artifacts/release/windows/manifest.json
            artifacts/release/windows/RELEASE_NOTES.md
            artifacts/public/downloads/windows.html
            artifacts/public/downloads/windows.json
          draft: false
          prerelease: ${{ inputs.prerelease == 'true' }}

  build-macos:
    name: Build macOS app
    needs: [typecheck, test, frontend-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prepare Node.js runtime
        run: node scripts/download-node-binary.mjs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Detect Apple signing secrets
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import Apple signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/lumi-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "${KEYCHAIN_PASSWORD:-temporary-password}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD:-temporary-password}" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD:-temporary-password}" "$KEYCHAIN_PATH"
      - name: Build signed macOS release kit
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:macos
      - name: Build unsigned macOS release kit
        if: steps.signing.outputs.enabled != 'true'
        run: npm run release:macos:unsigned
      - name: Upload macOS release kit
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-macos-release-kit
          path: |
            release/macos/**
          if-no-files-found: error

  release-macos:
    name: Create macOS GitHub Release
    needs: build-macos
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true' && inputs.release_platform == 'macos'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lumi-os-macos-release-kit
          path: artifacts
      - name: Normalize macOS artifact layout
        run: |
          if [ -f artifacts/manifest.json ] && [ ! -f artifacts/release/macos/manifest.json ]; then
            mkdir -p artifacts/release/macos
            find artifacts -maxdepth 1 -type f -exec mv {} artifacts/release/macos/ \;
          fi
      - name: Read release version
        id: meta
        run: |
          VERSION="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.version)")"
          ARCH="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.arch)")"
          DMG="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.dmgName)")"
          APP_ARCHIVE="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.appArchiveName)")"
          UNINSTALLER="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.uninstallerName)")"
          PACKAGE="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('artifacts/release/macos/manifest.json','utf8')); process.stdout.write(m.packageName)")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          echo "app_archive=${APP_ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "uninstaller=${UNINSTALLER}" >> "$GITHUB_OUTPUT"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=macos-v${VERSION}-${ARCH}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lumi OS ${{ steps.meta.outputs.version }} macOS ${{ steps.meta.outputs.arch }}
          body_path: artifacts/release/macos/RELEASE_NOTES.md
          files: |
            artifacts/release/macos/${{ steps.meta.outputs.package }}
            artifacts/release/macos/${{ steps.meta.outputs.dmg }}
            artifacts/release/macos/${{ steps.meta.outputs.app_archive }}
            artifacts/release/macos/${{ steps.meta.outputs.uninstaller }}
            artifacts/release/macos/SHA256SUMS.txt
            artifacts/release/macos/manifest.json
            artifacts/release/macos/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ inputs.prerelease == 'true' }}
